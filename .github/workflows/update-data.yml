name: Update Data Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/*.xlsx'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl xlrd

      - name: Run fix_data.py
        env:
          VROD_EXCEL_PATH: ${{ github.workspace }}/data/VROD-registry-files--2025-12.xlsx
        run: python scripts/fix_data.py

      - name: Run build_projects.py
        env:
          VROD_EXCEL_PATH: ${{ github.workspace }}/data/VROD-registry-files--2025-12.xlsx
        run: python scripts/build_projects.py

      - name: Commit updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          git diff --staged --quiet || git commit -m "chore: update data pipeline outputs [skip ci]"

      - name: Push changes
        run: git push
