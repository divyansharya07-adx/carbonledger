name: Update Data Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/*.xlsx'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl xlrd

      - name: Find Excel file
        id: find_excel
        run: |
          filename=$(ls data/*.xlsx | head -1 | xargs basename)
          echo "filename=$filename" >> $GITHUB_OUTPUT
          echo "Found: $filename"

      - name: Run build_projects.py
        env:
          VROD_EXCEL_PATH: ${{ github.workspace }}/data/${{ steps.find_excel.outputs.filename }}
        run: python scripts/build_projects.py

      - name: Run fix_data.py
        env:
          VROD_EXCEL_PATH: ${{ github.workspace }}/data/${{ steps.find_excel.outputs.filename }}
        run: python scripts/fix_data.py

      - name: Commit updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          git diff --staged --quiet || git commit -m "chore: update data pipeline outputs [skip ci]"

      - name: Push changes
        run: git push
